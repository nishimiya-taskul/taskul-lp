<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Helvetica Neue', 'Noto Sans JP', sans-serif">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="380" rx="12" fill="#f8f9fb"/>
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Slack連携タスク管理ツール 4選比較</text>
  <!-- Trello -->
  <rect x="20" y="65" width="180" height="295" rx="10" fill="#fff" filter="url(#s)"/>
  <rect x="20" y="65" width="180" height="6" rx="3" fill="#0079BF"/>
  <text x="110" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#0079BF">Trello</text>
  <text x="110" y="125" text-anchor="middle" font-size="10" fill="#888">ボード形式</text>
  <line x1="45" y1="140" x2="175" y2="140" stroke="#eee" stroke-width="1"/>
  <text x="110" y="165" text-anchor="middle" font-size="11" fill="#444">操作: ボタン</text>
  <text x="110" y="188" text-anchor="middle" font-size="11" fill="#444">AI: なし</text>
  <text x="110" y="211" text-anchor="middle" font-size="11" fill="#444">スレッド→タスク: ✗</text>
  <text x="110" y="234" text-anchor="middle" font-size="11" fill="#444">向き: チーム</text>
  <line x1="45" y1="250" x2="175" y2="250" stroke="#eee" stroke-width="1"/>
  <text x="110" y="275" text-anchor="middle" font-size="12" fill="#0079BF" font-weight="600">視覚的に管理</text>
  <text x="110" y="295" text-anchor="middle" font-size="12" fill="#0079BF" font-weight="600">したい人向け</text>
  <!-- Asana -->
  <rect x="210" y="65" width="180" height="295" rx="10" fill="#fff" filter="url(#s)"/>
  <rect x="210" y="65" width="180" height="6" rx="3" fill="#F06A6A"/>
  <text x="300" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#F06A6A">Asana</text>
  <text x="300" y="125" text-anchor="middle" font-size="10" fill="#888">プロジェクト管理</text>
  <line x1="235" y1="140" x2="365" y2="140" stroke="#eee" stroke-width="1"/>
  <text x="300" y="165" text-anchor="middle" font-size="11" fill="#444">操作: ボタン</text>
  <text x="300" y="188" text-anchor="middle" font-size="11" fill="#444">AI: なし</text>
  <text x="300" y="211" text-anchor="middle" font-size="11" fill="#444">スレッド→タスク: ✗</text>
  <text x="300" y="234" text-anchor="middle" font-size="11" fill="#444">向き: 大規模チーム</text>
  <line x1="235" y1="250" x2="365" y2="250" stroke="#eee" stroke-width="1"/>
  <text x="300" y="275" text-anchor="middle" font-size="12" fill="#F06A6A" font-weight="600">厳密なPJ管理</text>
  <text x="300" y="295" text-anchor="middle" font-size="12" fill="#F06A6A" font-weight="600">したい人向け</text>
  <!-- Todoist -->
  <rect x="400" y="65" width="180" height="295" rx="10" fill="#fff" filter="url(#s)"/>
  <rect x="400" y="65" width="180" height="6" rx="3" fill="#E44332"/>
  <text x="490" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#E44332">Todoist</text>
  <text x="490" y="125" text-anchor="middle" font-size="10" fill="#888">シンプルToDo</text>
  <line x1="425" y1="140" x2="555" y2="140" stroke="#eee" stroke-width="1"/>
  <text x="490" y="165" text-anchor="middle" font-size="11" fill="#444">操作: コマンド</text>
  <text x="490" y="188" text-anchor="middle" font-size="11" fill="#444">AI: なし</text>
  <text x="490" y="211" text-anchor="middle" font-size="11" fill="#444">スレッド→タスク: ✗</text>
  <text x="490" y="234" text-anchor="middle" font-size="11" fill="#444">向き: 個人</text>
  <line x1="425" y1="250" x2="555" y2="250" stroke="#eee" stroke-width="1"/>
  <text x="490" y="275" text-anchor="middle" font-size="12" fill="#E44332" font-weight="600">シンプルに</text>
  <text x="490" y="295" text-anchor="middle" font-size="12" fill="#E44332" font-weight="600">管理したい人向け</text>
  <!-- TASKUL -->
  <rect x="590" y="60" width="190" height="305" rx="10" fill="#fff" filter="url(#s)" stroke="#15cf78" stroke-width="2"/>
  <rect x="590" y="60" width="190" height="6" rx="3" fill="#15cf78"/>
  <text x="685" y="95" text-anchor="middle" font-size="16" font-weight="700" fill="#15cf78">TASKUL</text>
  <text x="685" y="120" text-anchor="middle" font-size="10" fill="#888">AI × フリーランス特化</text>
  <line x1="615" y1="135" x2="755" y2="135" stroke="#eee" stroke-width="1"/>
  <text x="685" y="160" text-anchor="middle" font-size="11" fill="#444" font-weight="600">操作: 自然言語</text>
  <text x="685" y="183" text-anchor="middle" font-size="11" fill="#444" font-weight="600">AI: 搭載</text>
  <text x="685" y="206" text-anchor="middle" font-size="11" fill="#15cf78" font-weight="700">スレッド→タスク: ✓</text>
  <text x="685" y="229" text-anchor="middle" font-size="11" fill="#444" font-weight="600">向き: フリーランス</text>
  <line x1="615" y1="245" x2="755" y2="245" stroke="#eee" stroke-width="1"/>
  <text x="685" y="270" text-anchor="middle" font-size="12" fill="#15cf78" font-weight="700">Slackから</text>
  <text x="685" y="290" text-anchor="middle" font-size="12" fill="#15cf78" font-weight="700">AIに話すだけ</text>
  <rect x="635" y="310" width="100" height="28" rx="14" fill="#15cf78"/>
  <text x="685" y="329" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">無料で試す</text>
</svg>
